---
# Configurações globais do cluster
cluster_name: "{{ cluster_name | default('k8s-cluster') }}"
pod_network_cidr: "10.244.0.0/16"
service_cidr: "10.96.0.0/12"

# Configurações do Kubernetes
kubernetes_version: "1.28.2"
kubernetes_cni: "canal"  # Flannel para rede de pods, Calico (Felix) para enforcement de NetworkPolicy
canal_version: "v3.28.3"  # última versão testada contra Kubernetes 1.27-1.30

# Configurações do Docker
docker_version: "24.0.5"

# Configurações de rede
apiserver_advertise_address: "{{ ansible_default_ipv4.address }}"
