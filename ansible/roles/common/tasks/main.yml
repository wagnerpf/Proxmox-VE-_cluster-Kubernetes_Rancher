---
- name: Atualizar cache de pacotes
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Instalar pacotes básicos
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - jq
    state: present

- name: Desabilitar swap
  shell: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Remover swap do fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Configurar módulos do kernel
  copy:
    content: |
      overlay
      br_netfilter
    dest: /etc/modules-load.d/k8s.conf

- name: Carregar módulos do kernel
  community.general.modprobe:
    name: "{{ item }}"
  loop:
    - overlay
    - br_netfilter

- name: Configurar parâmetros sysctl
  copy:
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    dest: /etc/sysctl.d/k8s.conf
  notify: reload sysctl

- name: Configurar timezone
  timezone:
    name: America/Sao_Paulo

- name: "Hardening SSH: desabilitar autenticação por senha"
  replace:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication\s+.*'
    replace: 'PasswordAuthentication no'
  notify: restart sshd

- name: "Hardening SSH: desabilitar login root"
  replace:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PermitRootLogin\s+.*'
    replace: 'PermitRootLogin no'
  notify: restart sshd

- name: Instalar UFW
  apt:
    name: ufw
    state: present

- name: "Firewall: permitir SSH (antes de habilitar, evita lockout)"
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: "Firewall: permitir Flannel VXLAN (rede de pods entre nós)"
  community.general.ufw:
    rule: allow
    port: '8472'
    proto: udp

- name: "Firewall: permitir Kubelet API (usado pelo API server e por kubectl exec/logs)"
  community.general.ufw:
    rule: allow
    port: '10250'
    proto: tcp

- name: "Firewall: política padrão - negar entrada"
  community.general.ufw:
    direction: incoming
    default: deny

- name: "Firewall: política padrão - permitir saída"
  community.general.ufw:
    direction: outgoing
    default: allow

- name: "Firewall: habilitar UFW"
  community.general.ufw:
    state: enabled
