---
# Playbook de exemplo: deploy de uma app de teste (nginx) via NodePort
# Execute após o cluster Kubernetes estar funcionando
# Uso: cd ansible && ansible-playbook -i inventory demo-nginx-install.yml && cd ..

- name: Deploy demo nginx
  hosts: masters[0]
  gather_facts: false

  pre_tasks:
    - name: "Instalar dependência Python para os módulos kubernetes.core"
      apt:
        name: python3-kubernetes
        state: present
        update_cache: yes
      become: yes

  tasks:
    - name: "Criar namespace"
      kubernetes.core.k8s:
        state: present
        api_version: v1
        kind: Namespace
        name: demo-nginx
        definition:
          metadata:
            labels:
              pod-security.kubernetes.io/enforce: baseline
              pod-security.kubernetes.io/audit: restricted
              pod-security.kubernetes.io/warn: restricted

    - name: "Criar deployment"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx
            namespace: demo-nginx
          spec:
            replicas: 2
            selector:
              matchLabels: { app: nginx }
            template:
              metadata:
                labels: { app: nginx }
              spec:
                containers:
                  - name: nginx
                    image: nginx:1.27-alpine
                    ports:
                      - containerPort: 80
                    resources:
                      requests: { cpu: "50m", memory: "64Mi" }
                      limits: { cpu: "200m", memory: "128Mi" }

    - name: "Criar service NodePort"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx
            namespace: demo-nginx
          spec:
            type: NodePort
            selector: { app: nginx }
            ports:
              - port: 80
                nodePort: 30080

  post_tasks:
    - name: "Verificar pods em execução"
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: demo-nginx
        field_selectors:
          - status.phase=Running
      register: nginx_pods

    - name: "Relatório final"
      debug:
        msg: "✅ nginx rodando com {{ nginx_pods.resources | length }} pods. Teste: curl http://<IP-de-qualquer-worker>:30080"
