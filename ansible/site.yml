---
- name: Aguardar disponibilidade dos nós
  hosts: all
  gather_facts: no
  become: no
  tasks:
    - name: Aguardar SSH ficar disponível (VMs recém-criadas)
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

- name: Preparar todos os nós
  hosts: all
  become: yes
  roles:
    - common

- name: Instalar Docker em todos os nós
  hosts: all
  become: yes
  roles:
    - docker

- name: Instalar Kubernetes em todos os nós
  hosts: all
  become: yes
  roles:
    - kubernetes

- name: Configurar masters
  hosts: masters
  become: yes
  roles:
    - kubernetes-master

- name: Configurar workers
  hosts: workers
  become: yes
  roles:
    - kubernetes-worker
